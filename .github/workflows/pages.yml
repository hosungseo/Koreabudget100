name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare standalone site
        run: |
          mkdir -p _site/artifacts
          cp index.html _site/index.html
          cp artifacts/budget_flow_map.html _site/artifacts/budget_flow_map.html
          cp artifacts/detailed_business_workflows.html _site/artifacts/detailed_business_workflows.html
          cp artifacts/detail_business_structure.html _site/artifacts/detail_business_structure.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
